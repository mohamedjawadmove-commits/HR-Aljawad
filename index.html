<!DOCTYPE html>

<html lang="en" dir="ltr">

<head>

  <meta charset="UTF-8">

  <title>Aljawad HR & Operations Co.</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }

  </style>

</head>

<body class="flex h-screen overflow-hidden">



  <div class="w-64 bg-slate-900 text-white flex flex-col justify-between p-4 shadow-xl">

    <div>

      <div class="flex items-center space-x-3 mb-8 mt-2 px-2">

        <i class="fa-solid fa-truck-flatbed text-amber-500 text-2xl"></i>

        <span class="text-xl font-bold tracking-wide">Aljawad Co.</span>

      </div>

      <nav class="space-y-1">

        <button onclick="switchTab('reports', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg bg-amber-500 text-slate-950 font-semibold transition-all">

          <i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard & Reports</span>

        </button>

        <button onclick="switchTab('employees', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

          <i class="fa-solid fa-users w-5"></i><span>HR Data</span>

        </button>

        <button onclick="switchTab('laborRecords', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

          <i class="fa-solid fa-triangle-exclamation w-5"></i><span>Labor Record</span>

        </button>

        <button onclick="switchTab('requests', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

          <i class="fa-solid fa-envelope-open-text w-5"></i><span>Request Data</span>

        </button>

        <button onclick="switchTab('attendance', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

          <i class="fa-solid fa-user-clock w-5"></i><span>Attendance Log</span>

        </button>

        <button onclick="switchTab('permissions', this)" class="tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

          <i class="fa-solid fa-shield-halved w-5"></i><span>System Security</span>

        </button>

      </nav>

    </div>

    <div class="text-xs text-slate-500 text-center border-t border-slate-800 pt-4">HR Engine v5.5-Hub © 2026</div>

  </div>



  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shadow-sm">

      <h1 id="page-title" class="text-xl font-bold text-gray-800">System Analytics Dashboard</h1>

      <div class="flex items-center space-x-4">

        <div id="search-container" class="relative hidden">

          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-xs"></i>

          <input type="text" id="search-input" onkeyup="filterCurrentTable()" placeholder="Search active logs..." class="border border-gray-200 rounded-lg pl-9 pr-4 py-1.5 text-sm bg-slate-50 focus:bg-white w-64">

        </div>

        <button id="add-btn" onclick="openAddModal()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2 transition-all hidden">

          <i class="fa-solid fa-plus"></i><span>Add Entry</span>

        </button>

      </div>

    </header>



    <main class="flex-1 overflow-x-auto overflow-y-auto p-8">

      <div id="loader" class="flex flex-col items-center justify-center py-20">

        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-amber-500 mb-3"></i>

        <p class="text-gray-500 text-sm">Streaming Firebase dataset via GitHub Cloud Node...</p>

      </div>



      <div id="table-container" class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hidden">

        <table id="data-table" class="w-full text-left border-collapse">

          <thead id="table-head" class="bg-slate-50 border-b border-gray-200 text-slate-700 font-semibold text-sm"></thead>

          <tbody id="table-body" class="text-gray-600 text-sm divide-y divide-gray-100"></tbody>

        </table>

      </div>



      <div id="dashboard-view" class="hidden space-y-6">

        <div class="flex border-b border-gray-200 space-x-2 bg-white p-2 rounded-xl border">

          <button onclick="renderReportSection('summary')" class="report-tab px-4 py-2 rounded-lg text-sm font-bold bg-amber-500 text-slate-950">Overview Dashboard</button>

          <button onclick="renderReportSection('iqama')" class="report-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Iqama Expiry Status</button>

          <button onclick="renderReportSection('ages')" class="report-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Age Demographics</button>

          <button onclick="renderReportSection('nationalities')" class="report-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Nationalities (%)</button>

          <button onclick="renderReportSection('vacations')" class="report-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Vacations Analytics</button>

          <button onclick="renderReportSection('salaries')" class="report-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Salaries & Finance</button>

        </div>

        <div id="report-content-view" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

      </div>

    </main>

  </div>



  <div id="crud-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">

    <div class="bg-white rounded-xl shadow-2xl border border-gray-100 w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh]">

      <header class="bg-slate-50 px-6 py-4 border-b border-gray-200 flex items-center justify-between">

        <h3 id="modal-title" class="font-bold text-gray-800 text-lg">Manage Entry</h3>

        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>

      </header>

      <form id="modal-form" onsubmit="saveRecord(event)" class="p-6 space-y-4 overflow-y-auto flex-1">

        <input type="hidden" id="form-key">

        <div id="form-fields" class="grid grid-cols-1 gap-4"></div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">

          <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>

          <button type="submit" id="save-btn" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold rounded-lg text-sm">Save Record</button>

        </div>

      </form>

    </div>

  </div>



  <script>

    // تهيئة مسارات وقفل قاعدة البيانات الآمنة مباشرة من المتصفح بدون وسيط

    const DB_URL = "https://aljawad-hr-system-default-rtdb.asia-southeast1.firebasedatabase.app/";

    const DB_SECRET = "5ZmEfIPJ7TSSch1VWN0wa2CbKmZ0IMcV7FcfEMEo";

    // رابط سيرفر جوجل لإرسال الإيميلات الفورية عند الإضافة من قبل الموظف

    const GAS_REST_API = "https://script.google.com/macros/s/AKfycbz_G1X4qRlyr6R5vS-2_f8qXn2_Your_Deployment_ID/exec"; 



    let currentTab = 'reports';

    let localDatabaseCache = { employees: {}, laborRecords: {}, requests: {}, attendance: {}, permissions: {} };



    // الـ Lists الجاهزة للـ Listboxes (تأمين إدخال البيانات للـ HR)

    const listsOptions = {

      nationality: ['Saudi', 'Egyptian', 'Indian', 'Pakistani', 'Bangladeshi', 'Sudanese', 'Yemeni'],

      jobTitle: ['Heavy Truck Driver', 'Dyna Driver', 'Operations Officer', 'Accountant', 'HR Specialist', 'Warehouse Worker', 'Operations Manager'],

      status: ['Present', 'Absent', 'On Vacation', 'Business Mission'],

      requestType: ['Vacation Leave', 'Salary Advance (سلفة)', 'Iqama Renewal', 'Resignation', 'Other Request']

    };



    const schemas = {

      employees: { employeeNo: 'E-', fullName: '', nationalId: '', jobTitle: '', totalSalary: '', iqamaExpDate: '', nationality: '', phoneNumber: '', birthDate: '', lastVacationReturnDate: '' },

      laborRecords: { sr: '', date: '', employeeName: '', recordType: '', actionTaken: '', amount: '', status: '', notes:'' },

      requests: { timestamp: '', email: '', fullName: '', requestType: '', requestDetails: '', status: 'Pending' },

      attendance: { date: '', employeeNo: '', name: '', checkIn: '', checkOut: '', status: 'Present' },

      permissions: { userEmail: '', role: 'Viewer', nodeAccess: 'All' }

    };



    window.onload = function() { preloadDatabaseFromHub(); };



    // سحب البيانات الفوري والمباشر من السيرفر بسرعة فائقة

    function preloadDatabaseFromHub() {

      fetch(`${DB_URL}.json?auth=${DB_SECRET}`)

        .then(res => res.json())

        .then(db => {

          localDatabaseCache.employees = db.employees || {};

          localDatabaseCache.laborRecords = db.laborRecords || {};

          localDatabaseCache.requests = db.requests || {};

          localDatabaseCache.attendance = db.attendance || {};

          localDatabaseCache.permissions = db.permissions || {};

          document.getElementById('loader').classList.add('hidden');

          switchTab('reports', document.querySelector('.tab-btn'));

        }).catch(err => alert("Error communicating with Cloud Realtime Engine."));

    }



    function switchTab(tabName, btn) {

      document.querySelectorAll('.tab-btn').forEach(b => {

        b.classList.remove('bg-amber-500', 'text-slate-950', 'font-bold');

        b.classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');

      });

      btn.classList.add('bg-amber-500', 'text-slate-950', 'font-bold');

      currentTab = tabName;

      document.getElementById('search-input').value = '';



      if (tabName === 'reports') {

        document.getElementById('page-title').innerText = 'System Analytics Dashboard';

        document.getElementById('table-container').classList.add('hidden');

        document.getElementById('add-btn').classList.add('hidden');

        document.getElementById('search-container').classList.add('hidden');

        document.getElementById('dashboard-view').classList.remove('hidden');

        renderReportSection('summary');

      } else {

        document.getElementById('page-title').innerText = tabName.toUpperCase() + ' Management Log';

        document.getElementById('dashboard-view').classList.add('hidden');

        document.getElementById('table-container').classList.remove('hidden');

        document.getElementById('add-btn').classList.remove('hidden');

        document.getElementById('search-container').classList.remove('hidden');

        renderTable(tabName, localDatabaseCache[tabName]);

      }

    }



    function filterCurrentTable() {

      const query = document.getElementById('search-input').value.toLowerCase();

      const rows = document.querySelectorAll('#table-body tr');

      rows.forEach(row => { row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none"; });

    }



    function renderTable(node, data) {

      const thead = document.getElementById('table-head');

      const tbody = document.getElementById('table-body');

      thead.innerHTML = ''; tbody.innerHTML = '';

      let itemsArray = Object.keys(data).map(key => { return { id: key, ...data[key] }; });



      if (node === 'employees') {

        itemsArray.sort((a, b) => (parseInt(String(a.employeeNo).replace(/[^0-9]/g, '')) || 0) - (parseInt(String(b.employeeNo).replace(/[^0-9]/g, '')) || 0));

        thead.innerHTML = `<tr>${['Emp No', 'Full Name', 'ID / Iqama', 'Job Title', 'Total Salary', 'Iqama Expire', 'Nationality', 'Phone', 'Actions'].map(h => `<th class="p-4">${h}</th>`).join('')}</tr>`;

        itemsArray.forEach(emp => {

          tbody.innerHTML += `<tr class="hover:bg-slate-50"><td class="p-4 font-bold text-slate-900">${emp.employeeNo}</td><td class="p-4 font-medium">${emp.fullName || '-'}</td><td class="p-4 font-mono">${emp.nationalId || '-'}</td><td class="p-4"><span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs border border-blue-100">${emp.jobTitle || '-'}</span></td><td class="p-4 text-emerald-600 font-bold">${emp.totalSalary} SAR</td><td class="p-4 text-amber-800">${emp.iqamaExpDate || '-'}</td><td class="p-4">${emp.nationality || '-'}</td><td class="p-4 text-xs font-mono">${emp.phoneNumber || '-'}</td><td class="p-4"><button onclick="openEditModal('${emp.id}')" class="text-blue-600 hover:text-blue-900"><i class="fa-solid fa-marker"></i></button></td></tr>`;

        });

      }

      else if (node === 'requests') {

        thead.innerHTML = `<tr>${['Request ID', 'Timestamp', 'Email', 'Full Name', 'Type', 'Status', 'Actions'].map(h => `<th class="p-4">${h}</th>`).join('')}</tr>`;

        itemsArray.forEach(req => {

          tbody.innerHTML += `

            <tr class="hover:bg-slate-50">

              <td class="p-4 font-mono text-xs text-slate-400">${req.id}</td>

              <td class="p-4 text-xs">${req.timestamp || '-'}</td>

              <td class="p-4 text-xs font-mono">${req.email || '-'}</td>

              <td class="p-4 font-medium">${req.fullName || '-'}</td>

              <td class="p-4 font-semibold text-indigo-600">${req.requestType || '-'}</td>

              <td class="p-4"><span class="px-2 py-0.5 rounded text-xs font-bold ${req.status === 'Solved' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}">${req.status || 'Pending'}</span></td>

              <td class="p-4 flex space-x-3">

                <button onclick="openEditModal('${req.id}')" class="text-blue-600"><i class="fa-solid fa-pen"></i></button>

                <button onclick="deleteRequestSecured('${req.id}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash-can"></i></button>

              </td>

            </tr>`;

        });

      }

      else {

        if (itemsArray.length === 0) { tbody.innerHTML = `<tr><td class="p-4 text-gray-400">Node log database is empty.</td></tr>`; return; }

        let fields = Object.keys(itemsArray[0]).filter(f => f !== 'id');

        thead.innerHTML = `<tr>${fields.map(f => `<th class="p-4 uppercase text-xs tracking-wider">${f}</th>`).join('')}<th class="p-4">Actions</th></tr>`;

        itemsArray.forEach(item => {

          let rowHtml = fields.map(f => `<td class="p-4">${item[f] || '-'}</td>`).join('');

          tbody.innerHTML += `<tr class="hover:bg-slate-50">${rowHtml}<td class="p-4"><button onclick="openEditModal('${item.id}')" class="text-blue-600"><i class="fa-solid fa-pen"></i></button></td></tr>`;

        });

      }

    }



    function deleteRequestSecured(key) {

      if (!confirm("Confirm secure deletion of this request?")) return;

      fetch(`${DB_URL}requests/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' })

        .then(res => { if(res.ok) preloadDatabaseFromHub(); });

    }



    function renderReportSection(type) {

      document.querySelectorAll('.report-tab').forEach(b => { b.classList.remove('bg-amber-500', 'text-slate-950', 'font-bold'); b.classList.add('text-gray-600'); });

      event.target.classList.add('bg-amber-500', 'text-slate-950', 'font-bold');

      const view = document.getElementById('report-content-view'); view.innerHTML = '';

      let emps = Object.values(localDatabaseCache.employees);



      if (type === 'summary') {

        view.innerHTML = `<div class="bg-white p-5 rounded-xl shadow border h-80"><canvas id="chartSalaries"></canvas></div><div class="bg-white p-5 rounded-xl shadow border h-80"><canvas id="chartLabor"></canvas></div><div class="bg-white p-5 rounded-xl shadow border h-80"><canvas id="chartRequests"></canvas></div>`;

        triggerSummaryCharts();

      } 

      else if (type === 'iqama') {

        view.className = "grid grid-cols-1 gap-4 w-full";

        let today = new Date();

        view.innerHTML = emps.map(e => {

          let daysLeft = 'Not Specified';

          if (e.iqamaExpDate) {

            let diff = new Date(e.iqamaExpDate).getTime() - today.getTime();

            daysLeft = Math.ceil(diff / (1000 * 3600 * 24)) + " Days Remaining";

          }

          return `<div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm"><div><h5 class="font-bold text-gray-800">${e.fullName}</h5><p class="text-xs text-gray-400">Emp No: ${e.employeeNo}</p></div><div class="text-right"><span class="text-sm font-bold text-amber-800 bg-amber-50 border border-amber-200 px-3 py-1 rounded-lg">${daysLeft}</span></div></div>`;

        }).join('');

      } 

      else if (type === 'ages') {

        view.className = "grid grid-cols-1 md:grid-cols-2 gap-6 w-full";

        view.innerHTML = `<div class="bg-white p-5 rounded-xl shadow border h-80 w-full"><canvas id="chartAge"></canvas></div>`;

        let ageGroups = { 'Under 30': 0, '30 - 45': 0, 'Above 45': 0 };

        emps.forEach(e => {

          if(e.birthDate) {

            let calcAge = 2026 - new Date(e.birthDate).getFullYear();

            if(calcAge < 30) ageGroups['Under 30']++;

            else if(calcAge <= 45) ageGroups['30 - 45']++;

            else ageGroups['Above 45']++;

          }

        });

        new Chart(document.getElementById('chartAge'), { type: 'bar', data: { labels: Object.keys(ageGroups), datasets: [{ label: 'Headcount', data: Object.values(ageGroups), backgroundColor: '#6366f1' }] }, options: { responsive:true, maintainAspectRatio:false } });

      } 

      else if (type === 'nationalities') {

        view.className = "grid grid-cols-1 md:grid-cols-2 gap-6 w-full";

        view.innerHTML = `<div class="bg-white p-5 rounded-xl shadow border h-80 w-full"><canvas id="chartNation"></canvas></div>`;

        let natMap = {}; emps.forEach(e => { if(e.nationality) natMap[e.nationality] = (natMap[e.nationality] || 0) + 1; });

        let total = emps.length || 1;

        let labelsWithPercent = Object.keys(natMap).map(k => `${k} (${((natMap[k]/total)*100).toFixed(1)}%)`);

        new Chart(document.getElementById('chartNation'), { type: 'pie', data: { labels: labelsWithPercent, datasets: [{ data: Object.values(natMap), backgroundColor: ['#10b981','#f59e0b','#ef4444','#3b82f6'] }] }, options: { responsive:true, maintainAspectRatio:false } });

      }

      else if (type === 'vacations') {

        view.className = "grid grid-cols-1 gap-4 w-full";

        let today = new Date();

        view.innerHTML = emps.map(e => {

          let statusText = "No previous return logged";

          if (e.lastVacationReturnDate) {

            let returnDate = new Date(e.lastVacationReturnDate);

            let nextVacationDate = new Date(returnDate.setFullYear(returnDate.getFullYear() + 2)); // حساب سنتين بدقة من تاريخ العودة

            let diff = nextVacationDate.getTime() - today.getTime();

            let days = Math.ceil(diff / (1000 * 3600 * 24));

            statusText = days > 0 ? `Next vacation due in ${days} days` : `❌ Vacation Cycle Overdue!`;

          }

          return `<div class="bg-white p-4 rounded-xl border flex justify-between items-center"><div><h5 class="font-bold text-gray-800">${e.fullName}</h5><p class="text-xs text-gray-400">Last Return: ${e.lastVacationReturnDate || 'None'}</p></div><div><span class="text-xs font-bold px-3 py-1 rounded bg-slate-100 text-slate-700">${statusText}</span></div></div>`;

        }).join('');

      }

      else if (type === 'salaries') {

        view.className = "grid grid-cols-1 gap-6 w-full";

        let natSalaryMap = {}; let totalPayroll = 0;

        emps.forEach(e => {

          let nat = e.nationality || 'Other'; let sal = parseFloat(e.totalSalary) || 0;

          natSalaryMap[nat] = (natSalaryMap[nat] || 0) + sal; totalPayroll += sal;

        });

        let financeRows = Object.keys(natSalaryMap).map(n => `<div class="flex justify-between border-b py-2 text-sm"><span>${n} Nationality:</span><span class="font-bold">${natSalaryMap[n].toLocaleString()} SAR</span></div>`).join('');

        view.innerHTML = `<div class="bg-white p-6 rounded-xl border shadow-sm"><h3 class="text-lg font-bold text-slate-900 border-b pb-3 mb-3">Payroll Distribution by Nationality</h3>${financeRows}<div class="flex justify-between text-lg font-bold text-emerald-600 mt-4 pt-2 border-t border-dashed"><span>Grand Total Payroll:</span><span>${totalPayroll.toLocaleString()} SAR</span></div></div>`;

      }

    }



    function triggerSummaryCharts() {

      let salaryMap = {}; Object.values(localDatabaseCache.employees).forEach(e => { salaryMap[e.jobTitle || 'Other'] = (salaryMap[e.jobTitle || 'Other'] || 0) + (parseFloat(e.totalSalary) || 0); });

      let laborMap = { 'Absence': 0, 'Penalty/Other': 0 }; Object.values(localDatabaseCache.laborRecords).forEach(l => { laborMap[l.recordType === 'Absence' ? 'Absence' : 'Penalty/Other']++; });

      let reqMap = { 'Pending': 0, 'Solved': 0 }; Object.values(localDatabaseCache.requests).forEach(r => { reqMap[r.status === 'Solved' ? 'Solved' : 'Pending']++; });

      new Chart(document.getElementById('chartSalaries'), { type: 'bar', data: { labels: Object.keys(salaryMap), datasets: [{ label: 'Payroll (SAR)', data: Object.values(salaryMap), backgroundColor: '#10b981' }] }, options: { responsive:true, maintainAspectRatio:false } });

      new Chart(document.getElementById('chartLabor'), { type: 'pie', data: { labels: Object.keys(laborMap), datasets: [{ data: Object.values(laborMap), backgroundColor: ['#ef4444','#f59e0b'] }] }, options: { responsive:true, maintainAspectRatio:false } });

      new Chart(document.getElementById('chartRequests'), { type: 'doughnut', data: { labels: Object.keys(reqMap), datasets: [{ data: Object.values(reqMap), backgroundColor: ['#f59e0b','#6366f1'] }] }, options: { responsive:true, maintainAspectRatio:false } });

    }



    function openEditModal(key) {

      document.getElementById('modal-title').innerText = 'Update Record';

      document.getElementById('form-key').value = key;

      generateFormFields(localDatabaseCache[currentTab][key]);

      document.getElementById('crud-modal').classList.remove('hidden');

    }



    function openAddModal() {

      document.getElementById('modal-title').innerText = 'Add New Entry';

      document.getElementById('form-key').value = '';

      generateFormFields(schemas[currentTab]);

      document.getElementById('crud-modal').classList.remove('hidden');

    }



    function closeModal() { document.getElementById('crud-modal').classList.add('hidden'); }



    // الـ Listboxes والمصفوفات الذكية لمنع الخطأ في الكتابة يدويًا

    function generateFormFields(obj) {

      const container = document.getElementById('form-fields'); container.innerHTML = '';

      for (let field in obj) {

        let labelText = field.replace(/([A-Z])/g, ' $1').toUpperCase();

        

        // التحقق والتحويل التلقائي إلى Listbox بناءً على اسم الحقل

        if (field === 'nationality' || field === 'jobTitle' || field === 'status' || field === 'requestType') {

          let optionsList = listsOptions[field];

          let optionsHtml = optionsList.map(opt => `<option value="${opt}" ${obj[field] === opt ? 'selected' : ''}>${opt}</option>`).join('');

          container.innerHTML += `

            <div>

              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${labelText} (قائمة خيارات)</label>

              <select name="${field}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-amber-500/20 focus:outline-none">

                ${optionsHtml}

              </select>

            </div>`;

        } else {

          let inputType = "text";

          if (field.toLowerCase().includes('date') || field === 'date' || field === 'timestamp') inputType = "date";

          container.innerHTML += `<div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">${labelText}</label><input type="${inputType}" name="${field}" value="${obj[field] || ''}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-slate-50 focus:bg-white focus:outline-none"></div>`;

        }

      }

    }



    function saveRecord(e) {

      e.preventDefault();

      const saveBtn = document.getElementById('save-btn'); saveBtn.innerText = "Securing Payload..."; saveBtn.disabled = true;

      const key = document.getElementById('form-key').value;

      const formData = new FormData(document.getElementById('modal-form'));

      let record = {}; formData.forEach((value, name) => { record[name] = value; });

      const targetKey = key || (currentTab === 'employees' ? record['employeeNo'] : 'id_' + Date.now());



      fetch(`${DB_URL}${currentTab}/${targetKey}.json?auth=${DB_SECRET}`, {

        method: 'PUT',

        body: JSON.stringify(record)

      }).then(res => {

        saveBtn.innerText = "Save Record"; saveBtn.disabled = false;

        if(res.ok) { closeModal(); preloadDatabaseFromHub(); }

      });

    }

  </script>

</body>

</html>
